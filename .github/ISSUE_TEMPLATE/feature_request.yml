name: "✨ 機能追加・改善"
description: "新しい機能の提案や既存機能の改善を依頼する"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能追加・改善のご提案ありがとうございます。背景と目的を明確にすると実装しやすくなります。

  - type: textarea
    id: problem
    attributes:
      label: "解決したい課題"
      description: "現状の何が問題か・不便かを教えてください"
      placeholder: "例: 増分抽出の watermark が手動更新のため、実行漏れが起きやすい"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "提案する解決策"
      description: "どのような機能・変更があれば解決するか"
      placeholder: "例: watermark を DB で自動管理し、ETL 完了後に自動更新する仕組みを追加する"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: "検討した代替案（任意）"
      description: "他に考えた方法があれば書いてください"
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "優先度"
      options:
        - "High - 早急に対応が必要"
        - "Medium - 次のイテレーションで対応"
        - "Low - 余裕があれば対応"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: "確認事項"
      options:
        - label: "同じ内容の Issue がないか検索した"
          required: true
