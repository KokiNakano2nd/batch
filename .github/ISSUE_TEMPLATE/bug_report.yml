name: "🐛 バグ報告"
description: "動作しない・エラーが出るなど不具合を報告する"
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。再現に必要な情報をできるだけ詳しく記入してください。

  - type: textarea
    id: description
    attributes:
      label: "バグの概要"
      description: "何が起きているか、一言で説明してください"
      placeholder: "例: CSV 読み込み時に KeyError が発生する"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "再現手順"
      description: "バグを再現するための手順を順番に書いてください"
      placeholder: |
        1. `python src/extract.py` を実行する
        2. `data/orders.csv` を読み込む
        3. KeyError が発生する
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "期待する動作"
      description: "本来どう動くべきか"
      placeholder: "例: エラーなく DataFrame が返ってくる"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "実際の動作（エラーメッセージ）"
      description: "実際に起きたこと・エラーログをそのまま貼ってください"
      render: shell
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "実行環境"
      description: "Python バージョン・OS など"
      placeholder: "例: Python 3.12 / Ubuntu 24.04 (WSL2)"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "確認事項"
      options:
        - label: "同じ内容の Issue がないか検索した"
          required: true
        - label: "最新の main ブランチで再現することを確認した"
          required: false
